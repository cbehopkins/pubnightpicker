[tox]
envlist = py311, py312, black
skip_missing_interpreters = true
isolated_build = True

[testenv]
deps = pytest
commands = pytest

[testenv:black]
extras=dev
commands =
    black --check --diff --color --exclude '(\.tox|\.git|\.venv|\.eggs|build|dist|docs)' .

[testenv:integration]
description = Run integration tests against a running Firestore emulator.
    Start the emulator first: firebase emulators:start --config firebase.integration.json --only firestore --project demo-firebase-sub-integration
deps = pytest
setenv =
    FIRESTORE_EMULATOR_HOST = 127.0.0.1:8080
    GOOGLE_CLOUD_PROJECT = demo-firebase-sub-integration
commands =
    pytest -m integration -v
