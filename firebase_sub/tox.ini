[tox]
requires =
    tox>=4.24
envlist = py312, black, flake8, mypy
skip_missing_interpreters = true
isolated_build = true

[testenv]
alwayscopy = true
skip_install = true
deps = poetry
    poetry-plugin-export
commands_pre =
    python -m poetry export --with dev --format requirements.txt --without-hashes --output {envtmpdir}/requirements.txt
    python -m pip install -r {envtmpdir}/requirements.txt
    python -m pip install --no-deps -e .
commands = python -m pytest

[testenv:black]
skip_install = true
commands_pre =
    python -m poetry export --only dev --format requirements.txt --without-hashes --output {envtmpdir}/requirements.txt
    python -m pip install -r {envtmpdir}/requirements.txt
commands =
    python -m black --check --diff --color .

[testenv:flake8]
skip_install = true
commands_pre =
    python -m poetry export --only dev --format requirements.txt --without-hashes --output {envtmpdir}/requirements.txt
    python -m pip install -r {envtmpdir}/requirements.txt
commands =
    python -m flake8 firebase_sub tests

[testenv:mypy]
skip_install = true
commands_pre =
    python -m poetry export --with dev --format requirements.txt --without-hashes --output {envtmpdir}/requirements.txt
    python -m pip install -r {envtmpdir}/requirements.txt
    python -m pip install --no-deps -e .
commands =
    python -m mypy firebase_sub

[flake8]
max-line-length = 88
extend-ignore = E203
exclude =
    .tox,
    .git,
    .venv,
    build,
    dist

[testenv:integration]
description = Run integration tests against running Firestore and Auth emulators.
    Start the emulators first: firebase emulators:start --config firebase.integration.json --only firestore,auth --project demo-firebase-sub-integration
setenv =
    FIRESTORE_EMULATOR_HOST = 127.0.0.1:8080
    GOOGLE_CLOUD_PROJECT = demo-firebase-sub-integration
    FIREBASE_AUTH_EMULATOR_HOST = 127.0.0.1:9199
commands =
    pytest -m integration -v
