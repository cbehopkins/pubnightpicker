<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a1a" />
    <title>Pub Night Picker — Offline</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4efe4;
            color: #1a1a1a;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            gap: 1.25rem;
        }

        img {
            width: 96px;
            height: 96px;
            border-radius: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        p {
            color: #555;
            max-width: 30ch;
            line-height: 1.5;
        }

        button {
            margin-top: 0.5rem;
            padding: 0.6rem 1.5rem;
            background: #1a1a1a;
            color: #f4efe4;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <img src="/icon-192.png" alt="Pub Night Picker icon" />
    <h1>You're offline</h1>
    <p>Check your connection, then try again. Previously visited pages will still load.</p>
    <button onclick="window.location.reload()">Try again</button>
</body>

</html>
