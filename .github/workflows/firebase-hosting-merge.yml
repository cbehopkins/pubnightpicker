# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUBNIGHTPICKER }}
      - name: Verify Firestore rules deploy permissions
        run: |
          set -euo pipefail
          if [ -n "${GOOGLE_GHA_CREDS_PATH:-}" ] && [ -f "${GOOGLE_GHA_CREDS_PATH}" ]; then
            gcloud auth activate-service-account --key-file="${GOOGLE_GHA_CREDS_PATH}" >/dev/null
          fi

          ACTIVE_ACCOUNT=$(gcloud auth list --format='value(account)' | head -n 1)
          if [ -z "$ACTIVE_ACCOUNT" ]; then
            echo "No active gcloud account found after auth step"
            exit 1
          fi

          echo "Active service account: $ACTIVE_ACCOUNT"
          TOKEN=$(gcloud auth print-access-token)

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST "https://firebaserules.googleapis.com/v1/projects/pubnightpicker:test" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"source":{"files":[{"name":"firestore.rules","content":"rules_version = '\''2'\''; service cloud.firestore { match /databases/{database}/documents { match /healthcheck/{doc} { allow read: if true; } } }"}]}}')

          HTTP_CODE=$(printf '%s\n' "$RESPONSE" | tail -n 1)
          BODY=$(printf '%s\n' "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Verified Firebaserules API access for serviceAccount:${ACTIVE_ACCOUNT}"
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "Missing Firebaserules permissions for serviceAccount:${ACTIVE_ACCOUNT}"
            echo "$BODY"
            echo "Grant roles/firebaserules.admin to the service account in FIREBASE_SERVICE_ACCOUNT_PUBNIGHTPICKER"
            exit 1
          else
            echo "Unexpected response while checking Firebaserules API access (HTTP ${HTTP_CODE})"
            echo "$BODY"
            exit 1
          fi
      - name: Validate web push build env
        shell: bash
        env:
          VITE_ENABLE_WEB_PUSH: ${{ secrets.VITE_ENABLE_WEB_PUSH }}
          VITE_WEB_PUSH_PUBLIC_KEY: ${{ secrets.VITE_WEB_PUSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          RAW_FLAG="${VITE_ENABLE_WEB_PUSH:-}"
          NORM_FLAG=$(printf '%s' "$RAW_FLAG" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]' | sed -E 's/^\"(.*)\"$/\1/' | sed -E "s/^'(.*)'$/\1/")

          if [ -z "$NORM_FLAG" ]; then
            echo "VITE_ENABLE_WEB_PUSH is empty or missing; build will hide push controls"
          elif [ "$NORM_FLAG" != "true" ] && [ "$NORM_FLAG" != "false" ]; then
            echo "VITE_ENABLE_WEB_PUSH must be true/false (optionally quoted). Got: $RAW_FLAG"
            exit 1
          fi

          if [ "$NORM_FLAG" = "true" ] && [ -z "${VITE_WEB_PUSH_PUBLIC_KEY:-}" ]; then
            echo "VITE_WEB_PUSH_PUBLIC_KEY must be set when VITE_ENABLE_WEB_PUSH=true"
            exit 1
          fi

          if [ "$NORM_FLAG" = "true" ]; then
            echo "Web push build flag enabled"
          else
            echo "Web push build flag disabled"
          fi
      - working-directory: ./react
        run: npm ci  && npm run build
        env:
          # Note: Using REACT_APP_ prefix for compatibility with Create React App environment variable naming conventions
          VITE_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          VITE_ENABLE_WEB_PUSH: ${{ secrets.VITE_ENABLE_WEB_PUSH }}
          VITE_WEB_PUSH_PUBLIC_KEY: ${{ secrets.VITE_WEB_PUSH_PUBLIC_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUBNIGHTPICKER }}
          channelId: live
          projectId: pubnightpicker
          entryPoint: react
      - name: Deploy Firestore rules
        working-directory: ./react
        run: npx firebase-tools deploy --only firestore:rules --project pubnightpicker
      - name: Deploy Firestore indexes
        shell: bash
        working-directory: ./react
        run: |
          set -euo pipefail
          if ! npx firebase-tools deploy --only firestore:indexes --project pubnightpicker; then
            echo "Firestore index deployment failed."
            echo "Ensure the service account in FIREBASE_SERVICE_ACCOUNT_PUBNIGHTPICKER has roles/datastore.indexAdmin."
            exit 1
          fi
