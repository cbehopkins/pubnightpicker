name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUBNIGHTPICKER }}
      - name: Validate web push build env
        shell: bash
        env:
          VITE_ENABLE_WEB_PUSH: ${{ secrets.VITE_ENABLE_WEB_PUSH }}
          VITE_WEB_PUSH_PUBLIC_KEY: ${{ secrets.VITE_WEB_PUSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          RAW_FLAG="${VITE_ENABLE_WEB_PUSH:-}"
          NORM_FLAG=$(printf '%s' "$RAW_FLAG" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]' | sed -E 's/^\"(.*)\"$/\1/' | sed -E "s/^'(.*)'$/\1/")

          if [ -z "$NORM_FLAG" ]; then
            echo "VITE_ENABLE_WEB_PUSH is empty or missing; build will hide push controls"
          elif [ "$NORM_FLAG" != "true" ] && [ "$NORM_FLAG" != "false" ]; then
            echo "VITE_ENABLE_WEB_PUSH must be true/false (optionally quoted). Got: $RAW_FLAG"
            exit 1
          fi

          if [ "$NORM_FLAG" = "true" ] && [ -z "${VITE_WEB_PUSH_PUBLIC_KEY:-}" ]; then
            echo "VITE_WEB_PUSH_PUBLIC_KEY must be set when VITE_ENABLE_WEB_PUSH=true"
            exit 1
          fi

          if [ "$NORM_FLAG" = "true" ]; then
            echo "Web push build flag enabled"
          else
            echo "Web push build flag disabled"
          fi
      - working-directory: ./react
        run: npm ci  && npm run build
        env:
          # Note: Using REACT_APP_ prefix for compatibility with Create React App environment variable naming conventions
          VITE_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          VITE_ENABLE_WEB_PUSH: ${{ secrets.VITE_ENABLE_WEB_PUSH }}
          VITE_WEB_PUSH_PUBLIC_KEY: ${{ secrets.VITE_WEB_PUSH_PUBLIC_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUBNIGHTPICKER }}
          projectId: pubnightpicker
          entryPoint: react
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Validate Firestore index config for push endpoints
        shell: bash
        working-directory: ./react
        run: |
          set -euo pipefail

          if [ ! -f firestore.indexes.json ]; then
            echo "Missing firestore.indexes.json"
            exit 1
          fi

          if ! grep -q '"collectionGroup"[[:space:]]*:[[:space:]]*"push_endpoints"' firestore.indexes.json; then
            echo "firestore.indexes.json must define collectionGroup push_endpoints"
            exit 1
          fi

          if ! grep -q '"fieldPath"[[:space:]]*:[[:space:]]*"active"' firestore.indexes.json; then
            echo "firestore.indexes.json must include fieldPath active for push_endpoints"
            exit 1
          fi

          if ! grep -q '"queryScope"[[:space:]]*:[[:space:]]*"COLLECTION_GROUP"' firestore.indexes.json; then
            echo "firestore.indexes.json must include COLLECTION_GROUP index scope for push_endpoints active"
            exit 1
          fi

          echo "Firestore push endpoint index config present"
      - name: Validate Firestore rules
        working-directory: ./react
        run: npx firebase-tools emulators:exec --only firestore "echo Firestore rules validated"
