name: Firestore Index Drift

on:
  pull_request:
    paths:
      - "react/firestore.indexes.json"
      - "react/.firebaserc"
      - "react/scripts/check-firestore-index-drift.mjs"
      - ".github/workflows/firestore-index-drift.yml"
  push:
    branches:
      - main
    paths:
      - "react/firestore.indexes.json"
      - "react/.firebaserc"
      - "react/scripts/check-firestore-index-drift.mjs"
      - ".github/workflows/firestore-index-drift.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firestore-index-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_index_drift:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: react
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUBNIGHTPICKER }}

      - name: Check Firestore index drift
        run: npm run check:firestore-indexes
